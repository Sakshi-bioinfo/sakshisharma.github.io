- title: Research / M.Sc. Dissertation
  place: Indian Institute of Technology Delhi, New Delhi, India
  date: January - September 2025
  image: /images/iit-delhi1.jpg
  description: >
    My MSc dissertation focused on developing machine learning models for prognostic modeling in meningioma using transcriptomic data. I performed sex-stratified analysis to investigate biological differences, applying differential expression and feature selection techniques. Multiple survival models, including Random Survival Forest, SVM-based approaches, LASSO, and CoxPH, were built and evaluated using C-index, AUC, and Brier score, along with external validation. Explainable AI (SHAP) was used to identify key prognostic features and derive minimal gene signatures for improved interpretability.
  reverse: true

